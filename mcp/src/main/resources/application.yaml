server:
  port: 8003
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-type: PKCS12
    key-store-password: 123456
    key-alias: local-ssl

spring:
  profiles:
    active: sse
  application:
    name: mcp-weather-server
  ai:
    mcp:
      server:
        enabled: true
        name: weather-mcp-server
        version: 1.0.0
        type: SYNC
        instructions: "这个服务是用来查询城市天气的。"
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
